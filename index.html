<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="media.css">
    <title>Tela de Login</title>
</head>

<body>
    <main>
        <section id="login">
            <div id="imagem"></div>
            <div id="formulario">
                <h1>Login</h1>
                <p>Seja bem-vindo(a) novamente. Faça login para acessar a sua conta e poder fazer as configurações para
                    o seu ambiente</p>
                <form class="form-login" action="">
                    <div class="nome">
                        <input type="text" name="nom" id="nome" placeholder="Degite o teu nome" required minlength="6">
                    </div>
                    <div class="senha">
                        <input type="password" name="nom" id="password" placeholder="Degite a sua senha" required
                            minlength="8">
                    </div>
                    <input type="button" value="Entrar">
                    <p><a href="https://www.youtube.com">Esqueceu a senha?</a></p>
                </form>
            </div>
        </section>
    </main>
</body>

</html>
